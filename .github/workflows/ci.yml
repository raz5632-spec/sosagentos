name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: salesos
          POSTGRES_PASSWORD: salesos_dev
          POSTGRES_DB: salesos
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U salesos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://salesos:salesos_dev@localhost:5433/salesos
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @salesos/db build # prisma generate
      - run: pnpm --filter @salesos/db migrate:deploy
      - run: pnpm --filter @salesos/db seed
      - run: pnpm turbo lint typecheck test
